<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sip & Paint Event</title>

<style>
/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

/* BODY */
body{
  min-height:100vh;
  background:linear-gradient(135deg,#fef9c3,#fde68a);
  font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

/* MAIN CONTAINER */
.event-container{
  background:white;
  max-width:900px;
  width:100%;
  border-radius:25px;
  box-shadow:0 15px 40px rgba(0,0,0,0.15);
  padding:30px;
  animation:fadeIn 1.2s ease;
}

/* HEADER */
.header{
  text-align:center;
  margin-bottom:20px;
}

.header h1{
  font-size:2.5rem;
  color:#92400e;
}

.header p{
  margin-top:10px;
  color:#444;
  font-size:1.1rem;
}

/* EVENT DETAILS */
.event-details{
  background:#fff7ed;
  padding:15px;
  border-radius:15px;
  text-align:center;
  margin:20px 0;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.event-details p{
  margin:6px 0;
  font-size:0.95rem;
  color:#1f2937;
}

/* IMAGE */
.image-box{
  display:flex;
  justify-content:center;
  margin:25px 0;
}

.image-box img{
  max-width:100%;
  width:400px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

/* FORM */
form{
  margin-top:20px;
}

.form-group{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

@media(max-width:600px){
  .form-group{
    grid-template-columns:1fr;
  }
}

label{
  font-weight:600;
  margin-bottom:5px;
  display:block;
}

input, textarea{
  width:100%;
  padding:12px;
  border-radius:25px;
  border:1px solid #ccc;
  outline:none;
}

textarea{
  resize:none;
  height:120px;
}

/* BUTTON */
button{
  width:100%;
  margin-top:20px;
  padding:14px;
  border-radius:30px;
  border:none;
  background:#92400e;
  color:white;
  font-size:1.1rem;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#78350f;
  transform:scale(1.03);
}

/* ANIMATION */
@keyframes fadeIn{
  from{opacity:0; transform:translateY(30px);}
  to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="event-container">

  <!-- HEADER -->
  <div class="header">
    <h1>Sip & Paint Event</h1>
    <p>A creative experience where art meets relaxation, music, wine, and connection.</p>
  </div>

  <!-- EVENT DETAILS -->
  <div class="event-details">
    <p><strong>📅 Date:</strong> Saturday, 12th April 2026</p>
    <p><strong>⏰ Time:</strong> 4:00 PM – 8:00 PM</p>
    <p><strong>📍 Location:</strong> Sip & Paint Studio, Lekki Phase 1, Lagos</p>
  </div>

  <!-- IMAGE -->
  <div class="image-box">
    <img src="art.png" alt="Sip and Paint Art">
  </div>

  <!-- FORM -->
  <form>

    <div class="form-group">
      <div>
        <label>First Name</label>
        <input type="text" required>
      </div>

      <div>
        <label>Last Name</label>
        <input type="text" required>
      </div>
    </div>

    <div class="form-group">
      <div>
        <label>Age</label>
        <input type="number" required>
      </div>

      <div>
        <label>Email</label>
        <input type="email" required>
      </div>
    </div>

    <div style="margin-top:15px;">
      <label>Tell us about yourself</label>
      <textarea placeholder="Tell us about your personality, painting experience, or why you want to attend..."></textarea>
    </div>

    <button type="submit">Register for the Event</button>

  </form>

</div>

</body>
</html>
